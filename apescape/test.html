<!DOCTYPE html>
<html>
<head>
    <title>Test Page</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
        .status { margin: 10px 0; padding: 10px; background: #222; border-left: 3px solid #0f0; }
        .error { border-left-color: #f00; color: #f00; }
        .success { border-left-color: #0f0; }
    </style>
</head>
<body>
    <h1>Debug Info</h1>
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');

        function log(msg, isError = false) {
            const div = document.createElement('div');
            div.className = 'status ' + (isError ? 'error' : 'success');
            div.textContent = msg;
            output.appendChild(div);
            console.log(msg);
        }

        log('Page loaded');
        log('Current URL: ' + window.location.href);
        log('Trying to fetch manifest.json...');

        fetch('manifest.json')
            .then(r => {
                log('Fetch response status: ' + r.status);
                return r.json();
            })
            .then(data => {
                const funcs = Object.keys(data.funcs || {});
                log(`SUCCESS: Loaded ${funcs.length} functions`);
                log('Sample functions: ' + funcs.slice(0, 5).join(', '));
            })
            .catch(e => {
                log('ERROR loading manifest: ' + e.message, true);
            });

        log('Checking if D3 loaded...');
        if (typeof d3 !== 'undefined') {
            log('SUCCESS: D3.js v' + d3.version + ' loaded');
        } else {
            log('ERROR: D3 not loaded', true);
        }
    </script>
</body>
</html>
