<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ape Escape Decomp - Live Status</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .timestamp {
            font-size: 13px;
            color: #94a3b8;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
        }

        .card-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 32px;
            font-weight: bold;
            color: #0ea5e9;
            margin-bottom: 5px;
        }

        .card-subtext {
            font-size: 13px;
            color: #64748b;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #0f172a;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ea5e9, #06b6d4);
            transition: width 0.3s ease;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #e2e8f0;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }

        .current-batch {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            font-size: 13px;
        }

        .current-batch.active {
            border-color: #0ea5e9;
            background: #0f2942;
        }

        .batch-label {
            color: #94a3b8;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .matches-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .match-badge {
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-dot.running {
            background: #10b981;
        }

        .status-dot.idle {
            background: #f59e0b;
            animation: none;
        }

        .status-dot.complete {
            background: #0ea5e9;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .refresh-info {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #64748b;
        }

        @media (max-width: 600px) {
            body {
                padding: 15px;
            }

            h1 {
                font-size: 20px;
            }

            .card-value {
                font-size: 24px;
            }

            .status-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐵 Ape Escape Decomp</h1>
            <p class="timestamp">Live Batch Executor Status</p>
            <p class="timestamp" id="timestamp"></p>
        </header>

        <div class="status-grid">
            <div class="card">
                <div class="card-title">Batches Processed</div>
                <div class="card-value" id="batches-processed">0</div>
                <div class="card-subtext" id="batches-total">of 0</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="batch-progress" style="width: 0%"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Functions Matched</div>
                <div class="card-value" id="matched-count">0</div>
                <div class="card-subtext" id="match-rate">0% match rate</div>
            </div>

            <div class="card">
                <div class="card-title">Total Attempted</div>
                <div class="card-value" id="total-attempted">0</div>
                <div class="card-subtext">
                    <span id="partial-count">0</span> partial,
                    <span id="failed-count">0</span> failed
                </div>
            </div>

            <div class="card">
                <div class="card-title">Running Time</div>
                <div class="card-value" id="elapsed-time">0s</div>
                <div class="card-subtext" id="status-indicator">
                    <span class="status-dot running"></span>
                    <span id="status-text">Running</span>
                </div>
            </div>
        </div>

        <div class="section" id="current-section" style="display: none;">
            <div class="section-title">Currently Processing</div>
            <div class="current-batch active">
                <div class="batch-label" id="current-batch-label"></div>
                <div id="current-batch-funcs"></div>
            </div>
        </div>

        <div class="section" id="recent-section" style="display: none;">
            <div class="section-title">Recent Matches</div>
            <div class="matches-list" id="recent-matches"></div>
        </div>

        <div class="refresh-info">
            Auto-refreshing every 2 seconds
        </div>
    </div>

    <script>
        async function updateStatus() {
            try {
                const response = await fetch('./live_status.json?t=' + Date.now());
                const data = await response.json();

                // Update timestamp
                const date = new Date(data.timestamp);
                document.getElementById('timestamp').textContent = date.toLocaleTimeString();

                // Update batch progress
                document.getElementById('batches-processed').textContent = data.batches.processed;
                document.getElementById('batches-total').textContent = `of ${data.batches.total}`;
                document.getElementById('batch-progress').style.width = `${data.batches.progress_pct}%`;

                // Update matches
                document.getElementById('matched-count').textContent = data.matches.matched;
                document.getElementById('match-rate').textContent = `${data.matches.match_rate_pct}% match rate`;
                document.getElementById('total-attempted').textContent = data.matches.total_attempted;
                document.getElementById('partial-count').textContent = data.matches.partial;
                document.getElementById('failed-count').textContent = data.matches.failed;

                // Update time
                const hours = Math.floor(data.elapsed_seconds / 3600);
                const mins = Math.floor((data.elapsed_seconds % 3600) / 60);
                const secs = data.elapsed_seconds % 60;
                const timeStr = hours > 0
                    ? `${hours}h ${mins}m`
                    : mins > 0
                    ? `${mins}m ${secs}s`
                    : `${secs}s`;
                document.getElementById('elapsed-time').textContent = timeStr;

                // Update status indicator
                const statusDot = document.querySelector('.status-dot');
                const statusText = document.getElementById('status-text');
                statusDot.className = `status-dot ${data.status}`;
                statusText.textContent = data.status.charAt(0).toUpperCase() + data.status.slice(1);

                // Update current batch
                const currentSection = document.getElementById('current-section');
                if (data.current_batch) {
                    currentSection.style.display = 'block';
                    document.getElementById('current-batch-label').textContent =
                        `Batch ${data.current_batch.num}/${data.batches.total} · ${data.current_batch.pattern} · ${data.current_batch.count} functions`;
                    document.getElementById('current-batch-funcs').textContent =
                        data.current_batch.functions.slice(0, 5).join(', ') +
                        (data.current_batch.functions.length > 5 ? ', ...' : '');
                } else {
                    currentSection.style.display = 'none';
                }

                // Update recent matches
                if (data.recent_matches.length > 0) {
                    document.getElementById('recent-section').style.display = 'block';
                    const matchesHtml = data.recent_matches
                        .slice()
                        .reverse()
                        .map(m => `<div class="match-badge">${m}</div>`)
                        .join('');
                    document.getElementById('recent-matches').innerHTML = matchesHtml;
                } else {
                    document.getElementById('recent-section').style.display = 'none';
                }

            } catch (error) {
                console.error('Failed to load status:', error);
            }
        }

        // Update immediately and then every 2 seconds
        updateStatus();
        setInterval(updateStatus, 2000);
    </script>
</body>
</html>
